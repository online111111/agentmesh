run:
  timeout: 5m
  tests: true
linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
linters-settings:
  errcheck:
    check-type-assertions: false
    exclude-functions:
      - fmt.Fprintln
      - fmt.Fprintf
      - fmt.Fprint
      - (*os.File).Close
      - (io.Closer).Close
      - (*net/http.Response).Body.Close
issues:
  exclude-use-default: false
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
    - path: cmd/
      linters:
        - errcheck
    - text: "Error return value of `.*\\.Close` is not checked"
      linters:
        - errcheck
