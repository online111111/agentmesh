run:
  timeout: 5m
  tests: true
linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
linters-settings:
  errcheck:
    check-type-assertions: false
    exclude-functions:
      - fmt.Fprintln
      - fmt.Fprintf
      - (*github.com/online111111/agentmesh/pkg/meshclient.Client).Close
      - (*net/http.Server).Close
issues:
  exclude-use-default: false
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
    - path: cmd/
      text: "Error return value of `fmt\\.F"
      linters:
        - errcheck
